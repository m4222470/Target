kind = "web"
previewPath = "/"
title = "Luxury Watch Product Page"
version = "1.0.0"
id = "artifacts/luxury-watch"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20936

[services.development]
run = "pnpm --filter @workspace/luxury-watch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/luxury-watch", "run", "build" ]
publicDir = "artifacts/luxury-watch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20936"
BASE_PATH = "/"
